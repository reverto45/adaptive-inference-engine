{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mlops-engine.fullname" . }}-worker-rolebinding
  labels:
    app.kubernetes.io/name: {{ include "mlops-engine.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ default (include "mlops-engine.fullname" . ) .Values.rbac.worker.serviceAccountName | trunc 63 }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "mlops-engine.fullname" . }}-worker-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
