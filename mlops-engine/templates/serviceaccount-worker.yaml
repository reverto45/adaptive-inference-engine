{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "mlops-engine.fullname" . ) .Values.rbac.worker.serviceAccountName | trunc 63 }}
  labels:
    app.kubernetes.io/name: {{ include "mlops-engine.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
