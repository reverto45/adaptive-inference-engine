{{- /*
PVC for Envoy shared config: dynamic depending on values.persistence.storage.type
Supported: hostPath (creates PV+PVC using hostPath), efs, gcpFilestore, azureFile
*/ -}}
{{- $storageType := .Values.persistence.storage.type -}}
{{- if eq $storageType "efs" -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-envoy-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.persistence.efs.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.storage.size }}
{{- else if eq $storageType "gcpFilestore" -}}
# For GCP Filestore, assume StorageClass & provisioner installed; reference the storage class
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-envoy-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.persistence.gcpFilestore.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.storage.size }}
{{- else if eq $storageType "azureFile" -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-envoy-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.persistence.azureFile.storageClassName | quote }}
  resources:
    requests:
      storage: {{ .Values.persistence.storage.size }}
{{- else -}}
{{ fail (printf "Unsupported persistence.storage.type: %s" $storageType) }}
{{- end -}}
