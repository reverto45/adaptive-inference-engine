apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-envoy-config
  labels:
    app.kubernetes.io/name: envoy
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  envoy.yaml: |
    node:
      id: {{ .Release.Name }}-gateway
      cluster: production_inference_cluster
    dynamic_resources:
      lds_config:
        path: /etc/envoy/lds.yaml
      cds_config:
        path: /etc/envoy/cds.yaml
    admin:
      access_log_path: /tmp/admin_access.log
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
  lds.yaml: |
    resources:
    - "@type": type.googleapis.com/envoy.config.listener.v3.Listener
      name: main_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: default_api
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/predict"
                          route:
                            cluster: {{ .Release.Name }}-baseline-service
                            request_mirror_policies:
                              - cluster: {{ .Release.Name }}-shadow-service
                                runtime_fraction:
                                  default_value:
                                    numerator: {{ .Values.envoy.shadowTrafficNumerator }}
                                    denominator: HUNDRED
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config: {}
  cds.yaml: |
    resources:
    - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
      name: {{ .Release.Name }}-baseline-service
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: {{ .Release.Name }}-baseline-service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{ .Release.Name }}-baseline-service
                      port_value: 8000
    - "@type": type.googleapis.com/envoy.config.cluster.v3.Cluster
      name: {{ .Release.Name }}-shadow-service
      connect_timeout: 0.25s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: {{ .Release.Name }}-shadow-service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{ .Release.Name }}-candidate-service
                      port_value: 8000
