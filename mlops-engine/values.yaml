replicaCount:
  baseline: 3
  worker: 2
  candidate: 1

image:
  repository: your-registry/mlops-engine
  tag: "1.0.0"
  pullPolicy: IfNotPresent

workerImage:
  repository: your-registry/mlops-worker
  tag: "1.0.0"
  pullPolicy: IfNotPresent

resources:
  baseline:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  worker:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

env:
  envoyConfigPath: "/etc/envoy"

secrets:
  redisUrl: "redis://redis-production.internal:6379/0"
  rabbitmqUrl: "amqp://rabbitmq-production.internal:5672/"

securityContext:
  runAsUser: 10001
  runAsNonRoot: true
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  baseline:
    port: 8000
  worker:
    port: 8001
    metricsPort: 9090

envoy:
  enabled: true
  serviceName: envoy-gateway
  port: 8080
  shadowTrafficNumerator: 10

persistence:
  # Select storage type for envoy shared config. Supported values: efs, gcpFilestore, azureFile
  storage:
    type: "efs"  # efs | gcpFilestore | azureFile
    size: "1Gi"
  efs:
    fileSystemId: ""           # e.g., fs-0123456789abcdef0 (EFS)
    storageClassName: "efs-sc" # optional pre-created StorageClass name for EFS CSI
  gcpFilestore:
    instance: ""              # e.g., projects/PROJECT/locations/REGION/instances/INSTANCE
    storageClassName: "gcp-filestore-sc"
  azureFile:
    storageAccountName: ""     # e.g., yourstorageacct
    shareName: "envoy-share"
    storageClassName: "azurefiles-sc"

# RBAC & service account for worker (to patch ConfigMaps if desired)
rbac:
  create: true
  worker:
    serviceAccountName: ""     # if left blank the chart will create one
    create: true

prometheus:
  enabled: true
  scrapeInterval: 15s
  scrape:
    worker: true

affinity: {}
tolerations: []
nodeSelector: {}
